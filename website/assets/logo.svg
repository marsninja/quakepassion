<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb86b"/>
      <stop offset="0.5" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#c43c00"/>
    </linearGradient>
    <linearGradient id="emberDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9442"/>
      <stop offset="0.55" stop-color="#ff5e0a"/>
      <stop offset="1" stop-color="#9c2a00"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient glow -->
  <circle cx="128" cy="118" r="118" fill="url(#glow)"/>
  <!-- the ring: quake's eternal circle -->
  <circle cx="128" cy="118" r="88" stroke="url(#ember)" stroke-width="15"/>
  <!-- inner ring shadow line -->
  <circle cx="128" cy="118" r="74" stroke="#ff7a18" stroke-opacity="0.18" stroke-width="2"/>
  <!-- the heart-spike: quake's hanging nail, reforged as a heart -->
  <path d="M128 238
           C 121 196 100 144 100 112
           C 100 89 114 80 128 98
           C 142 80 156 89 156 112
           C 156 144 135 196 128 238 Z"
        fill="url(#emberDeep)"/>
  <!-- spike highlight -->
  <path d="M128 222
           C 123 188 109 142 109 113
           C 109 99 116 92 124 99
           C 126 101 128 104 128 108
           C 128 144 128 190 128 222 Z"
        fill="#ffb86b" fill-opacity="0.28"/>
</svg>
